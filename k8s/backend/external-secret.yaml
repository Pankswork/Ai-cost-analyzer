# External Secrets — syncs secrets from AWS Secrets Manager to Kubernetes
#
# This manifest tells the External Secrets Operator to fetch the
# backend's secrets from AWS Secrets Manager and create a Kubernetes
# Secret named 'backend-secrets' in the cost-detective namespace.
#
# Prerequisites:
# - External Secrets Operator is installed in the cluster
# - AWS Secrets Manager has a secret named 'cost-detective-backend'
# - The EKS cluster has permission to read from Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: cost-detective
spec:
  refreshInterval: 1h  # Refresh secrets every hour

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: backend-secrets
    creationPolicy: Owner

  data:
    - secretKey: APP_JWT_SECRET_KEY
      remoteRef:
        key: cost-detective-backend
        property: jwt_secret_key

    - secretKey: APP_DATABASE_URL
      remoteRef:
        key: cost-detective-backend
        property: database_url

    - secretKey: APP_ZEN_API_KEY
      remoteRef:
        key: cost-detective-backend
        property: zen_api_key
