# Backend ConfigMap — non-sensitive configuration
# Sensitive values go in Secrets (managed by External Secrets Operator)
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cost-detective
data:
  APP_ENVIRONMENT: "production"
  APP_AWS_REGION: "us-east-1"
  APP_ZEN_MODEL: "deepseek-v4-flash-free"
  APP_JWT_ALGORITHM: "HS256"
  APP_JWT_EXPIRATION_MINUTES: "60"
  OTEL_SERVICE_NAME: "backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_DSN: ""
