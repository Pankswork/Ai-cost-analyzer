apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  namespace: cost-detective
  labels:
    app: backend
    release: prometheus
spec:
  groups:
    - name: backend
      rules:
        - alert: HighErrorRate
          expr: |
            rate(http_requests_duration_seconds_count{status_code=~"5.."}[5m])
            /
            rate(http_requests_duration_seconds_count[5m])
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High HTTP 5xx error rate"
            description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_requests_duration_seconds_bucket[5m])
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High request latency"
            description: "P99 latency is {{ $value }}s for the last 5 minutes"

        - alert: PodDown
          expr: kube_deployment_status_replicas_unavailable{deployment="backend"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Backend pod is down"
            description: "Deployment backend has {{ $value }} unavailable replicas"

        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="cost-detective",pod=~"backend-.*"}[5m]))
            /
            sum(kube_pod_container_resource_requests{namespace="cost-detective",resource="cpu",pod=~"backend-.*"})
            > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage"
            description: "CPU usage is {{ $value | humanizePercentage }} of requested resources"

        - alert: CostAnalysisJobFailed
          expr: kube_job_status_failed{job_name=~"cost-analysis-.*"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Cost analysis job failed"
            description: "Job {{ $labels.job_name }} has {{ $value }} failed pod(s)"
