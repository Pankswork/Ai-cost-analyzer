apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-check
  namespace: cost-detective
  labels:
    app: health-check
    component: cronjob
spec:
  schedule: "*/5 * * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 30
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: health-checker
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - |
                  URL="${BACKEND_URL:-http://backend:8000}/api/health"
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
                  if [ "$STATUS" != "200" ]; then
                    echo "Health check FAILED: HTTP $STATUS"
                    exit 1
                  fi
                  echo "Health check OK: HTTP $STATUS"
              env:
                - name: BACKEND_URL
                  value: "http://backend:8000"
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
