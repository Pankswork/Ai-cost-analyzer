services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: bestfreeaifor
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL","pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        
    backend:
        build: ./backend
        environment:
            APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/bestfreeaifor
            APP_JWT_SECRET_KEY: dev-secrect-keys
            APP_ENVIRONMENT: develpoment
            APP_CORS_ORIGINS: '["http://localhost:80","http://localhost"]'
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        
    frontend:
        restart: unless-stopped
        build: .
        ports:
            - "80:80"
        depends_on:
            - backend
        
volumes:
    pgdata:
