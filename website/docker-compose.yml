services:
    db:
        image: postgres:16-alpine
        env_file: .env
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-postgres}"]
            interval: 5s
            timeout: 5s
            retries: 5
        
    backend:
        build: ./backend
        env_file: .env
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        
    frontend:
        restart: unless-stopped
        build: .
        ports:
            - "80:80"
        depends_on:
            - backend
        
volumes:
    pgdata:
