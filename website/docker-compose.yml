services:
    db:
        image: postgres:16-alpine
        env_file: .env
        restart: unless-stopped
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - app-network

    backend:
        build: ./backend
        env_file: .env
        restart: unless-stopped
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - app-network

    frontend:
        restart: unless-stopped
        build: .
        ports:
            - "80:80"
        depends_on:
            - backend
        networks:
            - app-network

volumes:
    pgdata:

networks:
    app-network:
        driver: bridge
