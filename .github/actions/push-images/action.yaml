name: "Push Docker Images"
description: "Build and push images to ECR and DockerHub"

inputs:
  image-name:
    description: "Name of the image (backend/frontend)"
    required: true
  build-context:
    description: "Docker build context directory (defaults to ./<image-name>)"
    required: false
    default: ""
  dockerhub-username:
    description: "DockerHub username"
    required: true
  dockerhub-token:
    description: "DockerHub access token"
    required: true
  image-tag:
    description: "Docker image tag (commit SHA)"
    required: true
  ecr-registry:
    description: "ECR registry URL (account.dkr.ecr.region.amazonaws.com)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Build image
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        BUILD_CONTEXT: ${{ inputs.build-context }}
      run: |
        set -eu
        CONTEXT="${BUILD_CONTEXT}"
        if [ -z "$CONTEXT" ]; then
          CONTEXT="./${IMAGE_NAME}"
        fi
        docker build -t "${IMAGE_NAME}:latest" "$CONTEXT"
        docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:${IMAGE_TAG}"

    - name: Push to DockerHub
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        DOCKER_USER: ${{ inputs.dockerhub-username }}
        DOCKER_TOKEN: ${{ inputs.dockerhub-token }}
      run: |
        set -eu
        DOCKER_USER=$(echo "${DOCKER_USER}" | xargs)
        DOCKER_TOKEN=$(echo "${DOCKER_TOKEN}" | xargs)
        echo "Logging in to DockerHub as ${DOCKER_USER}"
        echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USER}" --password-stdin
        docker tag "${IMAGE_NAME}:latest" "${DOCKER_USER}/${IMAGE_NAME}:latest"
        docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${DOCKER_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
        docker push "${DOCKER_USER}/${IMAGE_NAME}" --all-tags

    - name: Push to ECR
      if: inputs.ecr-registry != ''
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        REGISTRY: ${{ inputs.ecr-registry }}
      run: |
        set -eu
        docker tag "${IMAGE_NAME}:latest" "${REGISTRY}/${IMAGE_NAME}:latest"
        docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
        docker push "${REGISTRY}/${IMAGE_NAME}" --all-tags
