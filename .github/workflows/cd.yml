name: CD — Build, Push, Deploy

on:
  workflow_run:
    workflows: ["CI — Lint, Test, Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to DockerHub
        shell: bash
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          DOCKER_USER=$(echo "${DOCKER_USER}" | xargs)
          DOCKER_TOKEN=$(echo "${DOCKER_TOKEN}" | xargs)
          echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USER}" --password-stdin

      - name: Get commit SHA
        run: echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_ENV

      - name: Get AWS account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Build, tag, and push backend
        uses: ./.github/actions/push-images
        with:
          image-name: backend
          build-context: ./website/backend
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ecr-registry: ${{ steps.login-ecr.outputs.registry }}
          image-tag: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build, tag, and push frontend
        uses: ./.github/actions/push-images
        with:
          image-name: frontend
          build-context: ./website
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ecr-registry: ${{ steps.login-ecr.outputs.registry }}
          image-tag: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Update manifest image tags
        run: |
          sed -i "s|image:.*backend:.*|image: ${{ steps.login-ecr.outputs.registry }}/backend:${{ env.IMAGE_TAG }}|" k8s/backend/deployment.yaml
          sed -i "s|image:.*frontend:.*|image: ${{ steps.login-ecr.outputs.registry }}/frontend:${{ env.IMAGE_TAG }}|" k8s/frontend/deployment.yaml

      - name: Sync frontend static assets to S3
        run: |
          cd website
          npm ci
          npm run build
          STATIC_BUCKET=$(aws s3api list-buckets --query "Buckets[?contains(Name, 'cost-detective-dev-static-assets')].Name" --output text)
          if [ -n "$STATIC_BUCKET" ]; then
            aws s3 sync dist/ s3://$STATIC_BUCKET/ --delete
          else
            echo "Static assets bucket not found — skipping S3 sync"
          fi

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
