name: CD — Build, Push, Deploy

on:
  push:
    branches: [main]
    paths:
      - 'website/backend/**'
      - 'website/**'

permissions:
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get AWS account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Build, tag, and push backend
        uses: ./.github/actions/push-images
        with:
          image-name: backend
          build-context: ./website/backend
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ecr-registry: ${{ steps.login-ecr.outputs.registry }}

      - name: Build, tag, and push frontend
        uses: ./.github/actions/push-images
        with:
          image-name: frontend
          build-context: ./website
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ecr-registry: ${{ steps.login-ecr.outputs.registry }}

      - name: Update manifest image tags
        run: |
          sed -i "s|image:.*backend:.*|image: ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}|" k8s/backend/deployment.yaml
          sed -i "s|image:.*frontend:.*|image: ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}|" k8s/frontend/deployment.yaml

      - name: Sync frontend static assets to S3
        run: |
          cd website
          npm ci
          npm run build
          STATIC_BUCKET=$(aws s3api list-buckets --query "Buckets[?contains(Name, 'cost-detective-dev-static-assets')].Name" --output text)
          if [ -n "$STATIC_BUCKET" ]; then
            aws s3 sync dist/ s3://$STATIC_BUCKET/ --delete
          else
            echo "Static assets bucket not found — skipping S3 sync"
          fi

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
