# CI Pipeline — runs on every PR and push to main
# Ensures code quality before merging and before CD
name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'website/backend/**'
      - 'website/**'
  push:
    branches: [main]
    paths:
      - 'website/backend/**'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Check for test files
        id: has-tests
        run: |
          if ls tests/ test_*.py 2>/dev/null | grep -q .; then echo "exists=true" >> "$GITHUB_OUTPUT"; fi

      - name: Run tests
        if: steps.has-tests.outputs.exists == 'true'
        run: pytest

      - name: Parse Terraform for scanner resource types
        run: python scripts/parse_terraform.py

      - name: Build Docker image
        run: docker build -t backend:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t frontend:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
