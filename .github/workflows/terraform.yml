name: Terraform — Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:  # Manual trigger — only runs init, validate & format (plan/apply skipped)

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: cost-detective-dev

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tfsec Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_51,CKV_AWS_355,CKV_AWS_290,CKV_AWS_117,CKV_AWS_116,CKV_AWS_272,CKV_AWS_130,CKV_AWS_289,CKV_AWS_115,CKV_AWS_149,CKV_TF_1

  terraform:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.11.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/dev

      - name: Terraform Format Check
        run: terraform fmt -check -diff
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'  
        run: terraform plan -no-color -var="zen_api_key=${{ secrets.ZEN_API_KEY }}" -var="admin_emails=${{ secrets.ADMIN_EMAILS }}"
        working-directory: terraform/environments/dev
        continue-on-error: true

      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            const output = `#### Terraform Plan 📖\n\`\`\`\n${process.env.PLAN}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply (networking first)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -target=module.networking -auto-approve
        working-directory: terraform/environments/dev

      - name: Terraform Apply (EKS cluster)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -target=module.eks -auto-approve
        working-directory: terraform/environments/dev

      - name: Terraform Apply (remaining infra)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="zen_api_key=${{ secrets.ZEN_API_KEY }}" -var="admin_emails=${{ secrets.ADMIN_EMAILS }}"
        working-directory: terraform/environments/dev

      - name: Setup Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/setup-helm@v4.2.0

      - name: Update Kubeconfig
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Install ALB Controller
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          VPC_ID=$(terraform -chdir=terraform/environments/dev output -raw vpc_id)
          LBC_ROLE_ARN=$(terraform -chdir=terraform/environments/dev output -raw alb_controller_role_arn)
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=${{ env.EKS_CLUSTER_NAME }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LBC_ROLE_ARN


